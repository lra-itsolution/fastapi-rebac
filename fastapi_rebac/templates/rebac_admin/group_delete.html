{% extends "rebac_admin/base.html" %}

{% block title %}Delete group{% endblock %}

{% block content %}
  <h1>Delete group</h1>

  <div class="card">
    <p><strong>ID:</strong> <code>{{ group_obj.id }}</code></p>
    <p><strong>Name:</strong> {{ group_obj.name }}</p>
  </div>

  <p>Are you sure you want to delete this group? Group memberships and group permissions will also be deleted.</p>

  <form method="post" class="section danger-zone">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit" class="danger" data-confirm="Delete this group?">Delete</button>
  </form>
{% endblock %}
