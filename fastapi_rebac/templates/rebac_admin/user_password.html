{% extends "rebac_admin/base.html" %}

{% block title %}Change password{% endblock %}

{% block content %}
  <h1>Change password</h1>

  <form method="post" class="admin-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label class="form-row is-required">
      <span class="field-label">Password <span class="required-marker">required</span></span>
      <input type="password" name="password" required>
    </label>

    <label class="form-row is-required">
      <span class="field-label">Confirm password <span class="required-marker">required</span></span>
      <input type="password" name="password_confirm" required>
    </label>

    <div class="form-actions">
      <button type="submit">Save</button>
    </div>
  </form>
{% endblock %}
